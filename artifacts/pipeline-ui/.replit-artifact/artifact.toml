kind = "web"
previewPath = "/"
title = "Document Intelligence Pipeline"
version = "1.0.0"
id = "artifacts/pipeline-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25288

[services.development]
run = "pnpm --filter @workspace/pipeline-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pipeline-ui", "run", "build" ]
publicDir = "artifacts/pipeline-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25288"
BASE_PATH = "/"
