name: Build and deploy Node.js app to Azure Web App - ai-data-tuning

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Build frontend
        run: pnpm --filter @workspace/pipeline-ui run build
        env:
          BASE_PATH: /

      - name: Copy frontend into API server
        run: |
          mkdir -p artifacts/api-server/frontend
          cp -r artifacts/pipeline-ui/dist/public/. artifacts/api-server/frontend/

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            artifacts/api-server/dist/
            artifacts/api-server/frontend/
            artifacts/api-server/package.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BEF14AAD3E8C473D85FEB2CC1BDB978F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FD006334845E4689B264B452C73C236A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_623F4D45ADFC4E15A04AF647DC061EF9 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ai-data-tuning'
          slot-name: 'Production'
          package: .
